<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wie viele Jahre kosten deine Gewohnheiten? Mach den Longevify-Check – 13 Fragen, kein Account.">
  <title>Longevify</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div id="app">

    <section id="screen-start" class="screen active">
      <div class="screen-inner">
        <div class="wordmark">Longevify</div>
        <h1>Wie viele Jahre kosten<br>deine Gewohnheiten?</h1>
        <p class="subtitle">13 Fragen. Kein Account. Kein Bullshit.</p>
        <button id="btn-start" class="btn-cta">Los geht's &rarr;</button>
        <p class="privacy-note">Alle Berechnungen laufen lokal in deinem Browser.<br>Keine Daten werden gespeichert oder übertragen.</p>
      </div>
    </section>

    <section id="screen-quiz" class="screen">
      <header class="quiz-header">
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-label" class="progress-label"></span>
      </header>
      <div class="q-wrap">
        <div id="q-content" class="q-content">
          <!-- rendered by JS -->
        </div>
      </div>
      <footer class="quiz-footer">
        <button id="btn-back" class="btn-back" aria-label="Zurück">← Zurück</button>
        <button id="btn-skip" class="btn-skip" aria-label="Überspringen">Überspringen →</button>
      </footer>
    </section>

    <section id="screen-result" class="screen">
      <header class="result-nav">
        <button id="btn-logo" class="wordmark btn-logo" aria-label="Zurück zum Start">Longevify</button>
      </header>
      <div id="result-inner" class="result-inner">
        <!-- rendered by JS -->
      </div>
    </section>

  </div>
  <script src="static/app.js"></script>
</body>
</html>
